name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger Render Deploy
        env:
          DEPLOY_URL: ${{ secrets.RENDER_HOOK }}
        run: |
          curl "$DEPLOY_URL"