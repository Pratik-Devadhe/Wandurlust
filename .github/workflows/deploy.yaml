name: Deploy to Ubuntu via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.SSH_WANDURLUST_HOST }}
          username: root
          key: ${{ secrets.SSH_WANDURLUST_KEY }}
          script: |
            cd /home/pratik-devadhe/Desktop/Wandurlust/Wandurlust
            git pull
            docker compose up -d --build